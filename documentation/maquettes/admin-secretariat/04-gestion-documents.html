<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion Documents — Admin Secrétariat | SocialFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   { DEFAULT: '#0F7BA7', light: '#1A9FD4', dark: '#0A5A7A' },
            secondary: { DEFAULT: '#10B981', light: '#34D399', dark: '#059669' },
            accent:    { DEFAULT: '#F97316' },
            danger:    { DEFAULT: '#EF4444' },
            warning:   { DEFAULT: '#F59E0B' },
            sidebar:   { DEFAULT: '#0F172A' },
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-in-out',
            'slide-up': 'slideUp 0.3s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          }
        }
      }
    }
  </script>
  <style>
    .modal-backdrop { animation: fadeIn 0.3s ease-in-out; }
    .modal-content { animation: slideUp 0.3s ease-out; }
    .toast { animation: slideUp 0.3s ease-out, fadeOut 0.3s ease-out 2.7s forwards; }
    @keyframes fadeOut { 100% { opacity: 0; transform: translateY(-10px); } }
    .file-icon { @apply flex items-center justify-center w-10 h-10 rounded-lg text-sm font-bold text-white; }
    .btn-primary { @apply bg-primary text-white px-4 py-2.5 rounded-lg text-sm font-medium hover:bg-primary-dark transition-colors disabled:opacity-50 disabled:cursor-not-allowed; }
    .btn-secondary { @apply bg-gray-200 text-gray-900 px-4 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-300 transition-colors; }
    .btn-danger { @apply bg-danger text-white px-4 py-2.5 rounded-lg text-sm font-medium hover:bg-red-600 transition-colors; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<main class="ml-64 min-h-screen flex flex-col">
  <!-- Header -->
  <div class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="px-8 py-6">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Documents</h1>
          <p class="text-gray-500 text-sm mt-1">Gestion des fichiers par employé</p>
        </div>
        <button onclick="openUploadModal()" class="btn-primary">
          + Ajouter document
        </button>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="p-8 flex-1">
    <!-- Filters & Search -->
    <div class="mb-6 flex flex-col sm:flex-row gap-4">
      <input
        type="text"
        id="searchInput"
        placeholder="Rechercher par employé ou titre..."
        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
      />
      <select id="typeFilter" class="px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
        <option value="">Tous les types</option>
        <option value="Contrat">Contrat</option>
        <option value="Certificat">Certificat</option>
        <option value="Diplôme">Diplôme</option>
        <option value="Autre">Autre</option>
      </select>
      <select id="empFilter" class="px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
        <option value="">Tous les employés</option>
        <option value="Marie Aubry">Marie Aubry</option>
        <option value="Sophie Noel">Sophie Noel</option>
        <option value="Jean Dupont">Jean Dupont</option>
        <option value="Marc Durand">Marc Durand</option>
      </select>
    </div>

    <!-- Documents Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="documentsGrid">
      <!-- Dynamically populated -->
    </div>

    <div id="emptyState" class="col-span-full text-center py-12">
      <svg class="w-12 h-12 opacity-20 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <p class="text-gray-500 text-sm">Aucun document trouvé</p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 py-6 px-8 text-center text-gray-500 text-sm">
    <p>&copy; 2026 SocialFlow SPRL. Tous droits réservés.</p>
  </footer>
</main>

<!-- UPLOAD MODAL -->
<div id="uploadModal" class="hidden fixed inset-0 bg-black/50 modal-backdrop z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl modal-content max-w-lg w-full max-h-[90vh] overflow-y-auto">
    <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
      <h2 class="text-xl font-bold text-gray-900">Ajouter document</h2>
      <button onclick="closeUploadModal()" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">&times;</button>
    </div>

    <form id="docForm" class="p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Employé *</label>
        <select id="formEmploye" required class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
          <option value="">Sélectionner un employé</option>
          <option value="Marie Aubry">Marie Aubry</option>
          <option value="Sophie Noel">Sophie Noel</option>
          <option value="Jean Dupont">Jean Dupont</option>
          <option value="Marc Durand">Marc Durand</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Titre du document *</label>
        <input type="text" id="formTitle" required placeholder="Ex: Contrat de travail" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Type de document *</label>
        <select id="formType" required class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
          <option value="">Sélectionner un type</option>
          <option value="Contrat">Contrat</option>
          <option value="Certificat">Certificat</option>
          <option value="Diplôme">Diplôme</option>
          <option value="Autre">Autre</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Fichier *</label>
        <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-primary transition-colors">
          <input type="file" id="formFile" required class="hidden" onchange="updateFileName(this)" />
          <svg class="w-8 h-8 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          <p class="text-gray-600 text-sm font-medium" id="fileLabel">Cliquer pour sélectionner un fichier</p>
          <p class="text-gray-500 text-xs mt-1">ou glisser-déposer</p>
        </div>
      </div>

      <input type="hidden" id="formId" />

      <div class="flex gap-3 pt-4 border-t border-gray-200">
        <button type="button" onclick="closeUploadModal()" class="btn-secondary flex-1">Annuler</button>
        <button type="submit" class="btn-primary flex-1">Ajouter</button>
      </div>
    </form>
  </div>
</div>

<!-- DELETE CONFIRMATION MODAL -->
<div id="deleteModal" class="hidden fixed inset-0 bg-black/50 modal-backdrop z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl modal-content max-w-md w-full">
    <div class="p-6">
      <div class="flex items-center justify-center w-12 h-12 mx-auto bg-red-100 rounded-full mb-4">
        <svg class="w-6 h-6 text-danger" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4v2m0 4v2m9-15a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h3 class="text-lg font-bold text-gray-900 text-center mb-2">Supprimer ce document ?</h3>
      <p class="text-gray-500 text-xs text-center mb-6 p-3 bg-gray-50 rounded">
        Cette action est irréversible.
      </p>
      <div class="flex gap-3">
        <button onclick="closeDeleteModal()" class="btn-secondary flex-1">Annuler</button>
        <button onclick="confirmDelete()" class="btn-danger flex-1">Supprimer</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST NOTIFICATIONS -->
<div id="toastContainer" class="fixed bottom-6 right-6 z-50 space-y-2"></div>

<script src="./includes-admin.js"></script>
<script>
// ============ STATE MANAGEMENT ============
let documents = [];
let currentDeleteId = null;

// ============ INITIALIZATION ============
function initData() {
  const saved = localStorage.getItem('socialflow_documents');
  if (saved) {
    documents = JSON.parse(saved);
  } else {
    documents = [
      { id: 1, employe: 'Marie Aubry', title: 'Contrat de travail CDI', type: 'Contrat', filename: 'contrat_marie_2022.pdf', date: '2022-01-15' },
      { id: 2, employe: 'Marie Aubry', title: 'Diplôme d\'État', type: 'Diplôme', filename: 'diplome_marie.pdf', date: '2020-06-20' },
      { id: 3, employe: 'Sophie Noel', title: 'Contrat de travail CDI', type: 'Contrat', filename: 'contrat_sophie_2023.pdf', date: '2023-03-20' },
      { id: 4, employe: 'Sophie Noel', title: 'Certificat de travail', type: 'Certificat', filename: 'cert_sophie_2023.pdf', date: '2023-12-01' },
      { id: 5, employe: 'Jean Dupont', title: 'Contrat CDD', type: 'Contrat', filename: 'contrat_jean_cdd.pdf', date: '2023-06-01' },
      { id: 6, employe: 'Marc Durand', title: 'Contrat freelance', type: 'Contrat', filename: 'contrat_marc_freelance.pdf', date: '2024-01-10' },
    ];
    saveData();
  }
  renderDocuments();
  setupEventListeners();
}

function saveData() {
  localStorage.setItem('socialflow_documents', JSON.stringify(documents));
}

// ============ EVENTS ============
function setupEventListeners() {
  document.getElementById('searchInput').addEventListener('input', renderDocuments);
  document.getElementById('typeFilter').addEventListener('change', renderDocuments);
  document.getElementById('empFilter').addEventListener('change', renderDocuments);
  document.getElementById('docForm').addEventListener('submit', handleFormSubmit);
}

function updateFileName(input) {
  const label = document.getElementById('fileLabel');
  if (input.files && input.files[0]) {
    label.textContent = input.files[0].name;
  }
}

// ============ RENDERING ============
function getFilteredData() {
  let data = [...documents];

  const search = document.getElementById('searchInput').value.toLowerCase();
  if (search) {
    data = data.filter(d =>
      d.employe.toLowerCase().includes(search) ||
      d.title.toLowerCase().includes(search)
    );
  }

  const type = document.getElementById('typeFilter').value;
  if (type) {
    data = data.filter(d => d.type === type);
  }

  const emp = document.getElementById('empFilter').value;
  if (emp) {
    data = data.filter(d => d.employe === emp);
  }

  return data;
}

function renderDocuments() {
  const data = getFilteredData();
  const grid = document.getElementById('documentsGrid');
  const empty = document.getElementById('emptyState');

  grid.innerHTML = '';

  if (data.length === 0) {
    empty.classList.remove('hidden');
    return;
  }

  empty.classList.add('hidden');

  data.forEach(doc => {
    const typeColors = { 'Contrat': 'bg-blue-100 text-blue-700', 'Certificat': 'bg-green-100 text-green-700', 'Diplôme': 'bg-purple-100 text-purple-700', 'Autre': 'bg-gray-100 text-gray-700' };
    const typeColor = typeColors[doc.type] || typeColors['Autre'];

    const ext = doc.filename.split('.').pop().toUpperCase();
    const iconBg = ext === 'PDF' ? 'bg-red-500' : ext === 'DOC' || ext === 'DOCX' ? 'bg-blue-500' : 'bg-gray-500';

    const card = document.createElement('div');
    card.className = 'bg-white rounded-lg border border-gray-200 p-4 hover:shadow-md transition-shadow';
    card.innerHTML = `
      <div class="flex items-start justify-between mb-3">
        <div class="file-icon ${iconBg}">
          ${ext.substring(0, 3)}
        </div>
        <button onclick="openDeleteModal(${doc.id})" class="text-gray-400 hover:text-red-600 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>
      <p class="text-sm font-medium text-gray-900 mb-1">${escapeHtml(doc.title)}</p>
      <p class="text-xs text-gray-500 mb-3">${escapeHtml(doc.employe)}</p>
      <div class="flex items-center justify-between">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${typeColor}">
          ${doc.type}
        </span>
        <span class="text-xs text-gray-400">${doc.date}</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ============ MODALS ============
function openUploadModal() {
  document.getElementById('docForm').reset();
  document.getElementById('fileLabel').textContent = 'Cliquer pour sélectionner un fichier';
  document.getElementById('formId').value = '';
  document.getElementById('uploadModal').classList.remove('hidden');
}

function closeUploadModal() {
  document.getElementById('uploadModal').classList.add('hidden');
  document.getElementById('docForm').reset();
}

function openDeleteModal(id) {
  currentDeleteId = id;
  document.getElementById('deleteModal').classList.remove('hidden');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.add('hidden');
  currentDeleteId = null;
}

// ============ FORM HANDLING ============
function handleFormSubmit(e) {
  e.preventDefault();

  const employe = document.getElementById('formEmploye').value;
  const title = document.getElementById('formTitle').value.trim();
  const type = document.getElementById('formType').value;
  const fileInput = document.getElementById('formFile');

  if (!employe || !title || !type || !fileInput.files[0]) {
    showToast('Tous les champs sont obligatoires', 'error');
    return;
  }

  const filename = fileInput.files[0].name;
  const newId = Math.max(...documents.map(d => d.id), 0) + 1;
  const today = new Date().toISOString().split('T')[0];

  documents.push({ id: newId, employe, title, type, filename, date: today });
  saveData();
  renderDocuments();
  showToast('Document ajouté avec succès', 'success');
  closeUploadModal();
}

function confirmDelete() {
  if (!currentDeleteId) return;
  documents = documents.filter(d => d.id !== currentDeleteId);
  saveData();
  renderDocuments();
  showToast('Document supprimé avec succès', 'success');
  closeDeleteModal();
}

// ============ INITIALIZATION ============
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initData);
} else {
  initData();
}
</script>
</body>
</html>
