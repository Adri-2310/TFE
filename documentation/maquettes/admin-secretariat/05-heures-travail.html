<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heures de Travail — Admin Secrétariat | SocialFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   { DEFAULT: '#0F7BA7', light: '#1A9FD4', dark: '#0A5A7A' },
            secondary: { DEFAULT: '#10B981', light: '#34D399', dark: '#059669' },
            accent:    { DEFAULT: '#F97316' },
            danger:    { DEFAULT: '#EF4444' },
            warning:   { DEFAULT: '#F59E0B' },
            sidebar:   { DEFAULT: '#0F172A' },
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-in-out',
            'slide-up': 'slideUp 0.3s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          }
        }
      }
    }
  </script>
  <style>
    .modal-backdrop { animation: fadeIn 0.3s ease-in-out; }
    .modal-content { animation: slideUp 0.3s ease-out; }
    .toast { animation: slideUp 0.3s ease-out, fadeOut 0.3s ease-out 2.7s forwards; }
    @keyframes fadeOut { 100% { opacity: 0; transform: translateY(-10px); } }
    .badge-complete { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800; }
    .badge-partial { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800; }
    .badge-missing { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800; }
    .btn-primary { @apply bg-primary text-white px-4 py-2.5 rounded-lg text-sm font-medium hover:bg-primary-dark transition-colors disabled:opacity-50 disabled:cursor-not-allowed; }
    .btn-secondary { @apply bg-gray-200 text-gray-900 px-4 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-300 transition-colors; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<main class="ml-64 min-h-screen flex flex-col">
  <!-- Header -->
  <div class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="px-8 py-6">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Heures de Travail</h1>
          <p class="text-gray-500 text-sm mt-1">Pointage et totalisation par semaine</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="p-8 flex-1">
    <!-- Week Selector -->
    <div class="mb-6 flex items-center gap-4">
      <div class="flex items-center gap-2">
        <label class="text-sm font-medium text-gray-700">Semaine du</label>
        <input type="date" id="weekStart" class="px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary" />
      </div>
      <button onclick="previousWeek()" class="btn-secondary">← Précédente</button>
      <button onclick="nextWeek()" class="btn-secondary">Suivante →</button>
      <button onclick="currentWeek()" class="btn-secondary">Aujourd'hui</button>
    </div>

    <!-- Employees Hours Table -->
    <div class="bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Employé</th>
              <th class="px-6 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Lun</th>
              <th class="px-6 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Mar</th>
              <th class="px-6 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Mer</th>
              <th class="px-6 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Jeu</th>
              <th class="px-6 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Ven</th>
              <th class="px-6 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Sam</th>
              <th class="px-6 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Dim</th>
              <th class="px-6 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Graphique</th>
              <th class="px-6 py-3 text-right text-xs font-semibold text-gray-600 uppercase tracking-wider">Total</th>
              <th class="px-6 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Statut</th>
            </tr>
          </thead>
          <tbody id="hoursTableBody" class="divide-y divide-gray-200">
            <!-- Dynamically populated -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4">
      <button onclick="markWeekComplete()" class="bg-secondary text-white px-4 py-3 rounded-lg text-sm font-medium hover:bg-secondary-dark transition-colors flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        Valider la semaine
      </button>
      <button onclick="exportWeekData()" class="bg-primary text-white px-4 py-3 rounded-lg text-sm font-medium hover:bg-primary-dark transition-colors flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Exporter
      </button>
      <button onclick="printWeek()" class="bg-accent text-white px-4 py-3 rounded-lg text-sm font-medium hover:bg-orange-600 transition-colors flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
        </svg>
        Imprimer
      </button>
    </div>

    <!-- Statistics -->
    <div class="mt-6 grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 uppercase font-semibold mb-2">Total heures</p>
        <p class="text-2xl font-bold text-gray-900" id="totalHours">0h</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 uppercase font-semibold mb-2">Heures supplémentaires</p>
        <p class="text-2xl font-bold text-orange-600" id="overtimeHours">0h</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 uppercase font-semibold mb-2">Congés/Jours fériés</p>
        <p class="text-2xl font-bold text-blue-600" id="holidayHours">0h</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 uppercase font-semibold mb-2">Dossiers complets</p>
        <p class="text-2xl font-bold text-green-600" id="completeCount">0/4</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 py-6 px-8 text-center text-gray-500 text-sm">
    <p>&copy; 2026 SocialFlow SPRL. Tous droits réservés.</p>
  </footer>
</main>

<!-- EDIT HOURS MODAL -->
<div id="editModal" class="hidden fixed inset-0 bg-black/50 modal-backdrop z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl modal-content max-w-md w-full">
    <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
      <h2 class="text-xl font-bold text-gray-900" id="editModalTitle">Éditer heures</h2>
      <button onclick="closeEditModal()" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">&times;</button>
    </div>

    <form id="editForm" class="p-6 space-y-4">
      <div id="dayInputs" class="space-y-3">
        <!-- Dynamically populated -->
      </div>

      <div class="flex gap-3 pt-4 border-t border-gray-200">
        <button type="button" onclick="closeEditModal()" class="btn-secondary flex-1">Annuler</button>
        <button type="submit" class="btn-primary flex-1">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<!-- TOAST NOTIFICATIONS -->
<div id="toastContainer" class="fixed bottom-6 right-6 z-50 space-y-2"></div>

<script src="./includes-admin.js"></script>
<script>
// ============ STATE MANAGEMENT ============
let weekHours = {};
let currentEditingEmploye = null;
const EMPLOYEES = ['Marie Aubry', 'Sophie Noel', 'Jean Dupont', 'Marc Durand'];

// ============ INITIALIZATION ============
function initData() {
  const saved = localStorage.getItem('socialflow_heures');
  if (saved) {
    weekHours = JSON.parse(saved);
  } else {
    weekHours = {};
    // Initialize with some sample data for current week
    EMPLOYEES.forEach(emp => {
      weekHours[emp] = {
        '2026-06-24': [8, 8, 8, 8, 8, 0, 0],
        '2026-07-01': [8, 8, 8, 8, 8, 0, 0],
      };
    });
    saveData();
  }

  setCurrentWeek();
  setupEventListeners();
  renderTable();
  updateStats();
}

function saveData() {
  localStorage.setItem('socialflow_heures', JSON.stringify(weekHours));
}

// ============ DATE MANAGEMENT ============
function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

function formatDate(date) {
  return date.toISOString().split('T')[0];
}

function setCurrentWeek() {
  const monday = getMonday(new Date());
  document.getElementById('weekStart').value = formatDate(monday);
}

function previousWeek() {
  const date = new Date(document.getElementById('weekStart').value);
  date.setDate(date.getDate() - 7);
  document.getElementById('weekStart').value = formatDate(getMonday(date));
  renderTable();
}

function nextWeek() {
  const date = new Date(document.getElementById('weekStart').value);
  date.setDate(date.getDate() + 7);
  document.getElementById('weekStart').value = formatDate(getMonday(date));
  renderTable();
}

function currentWeek() {
  setCurrentWeek();
  renderTable();
}

// ============ EVENTS ============
function setupEventListeners() {
  document.getElementById('weekStart').addEventListener('change', renderTable);
  document.getElementById('editForm').addEventListener('submit', handleSaveHours);
}

// ============ TABLE RENDERING ============
function renderTable() {
  const weekStart = document.getElementById('weekStart').value;
  const tbody = document.getElementById('hoursTableBody');
  tbody.innerHTML = '';

  EMPLOYEES.forEach(emp => {
    if (!weekHours[emp]) {
      weekHours[emp] = {};
    }

    const hours = weekHours[emp][weekStart] || [0, 0, 0, 0, 0, 0, 0];
    const total = hours.reduce((a, b) => a + b, 0);
    const status = total >= 40 ? 'badge-complete' : total > 0 ? 'badge-partial' : 'badge-missing';
    const statusText = total >= 40 ? 'Complet' : total > 0 ? 'Partiel' : 'Incomplet';

    // Generate mini bar chart SVG
    const maxHours = 10;
    const barWidth = 6;
    const barSpacing = 2;
    const chartHeight = 30;
    const chartWidth = 70;
    const colors = ['#10B981', '#10B981', '#10B981', '#10B981', '#10B981', '#F59E0B', '#6B7280'];

    let barsSvg = '<svg viewBox="0 0 72 36" width="72" height="36" class="inline-block" role="img" aria-label="Heures quotidiennes">';
    hours.forEach((h, idx) => {
      const heightPercent = (Math.min(h, maxHours) / maxHours) * chartHeight;
      const x = idx * (barWidth + barSpacing) + 2;
      const y = chartHeight - heightPercent + 3;
      const color = colors[idx];
      barsSvg += `<rect x="${x}" y="${y}" width="${barWidth}" height="${heightPercent}" fill="${color}" rx="1" class="hover:opacity-80"/>`;
    });
    barsSvg += '</svg>';

    const tr = document.createElement('tr');
    tr.className = 'hover:bg-gray-50 transition-colors cursor-pointer';
    tr.onclick = () => openEditModal(emp, weekStart);
    tr.innerHTML = `
      <td class="px-6 py-4 text-sm font-medium text-gray-900">${escapeHtml(emp)}</td>
      <td class="px-6 py-4 text-center text-sm font-medium" style="color: ${total >= 40 ? '#10B981' : total > 0 ? '#F59E0B' : '#6B7280'}">${hours[0]}h</td>
      <td class="px-6 py-4 text-center text-sm font-medium" style="color: ${total >= 40 ? '#10B981' : total > 0 ? '#F59E0B' : '#6B7280'}">${hours[1]}h</td>
      <td class="px-6 py-4 text-center text-sm font-medium" style="color: ${total >= 40 ? '#10B981' : total > 0 ? '#F59E0B' : '#6B7280'}">${hours[2]}h</td>
      <td class="px-6 py-4 text-center text-sm font-medium" style="color: ${total >= 40 ? '#10B981' : total > 0 ? '#F59E0B' : '#6B7280'}">${hours[3]}h</td>
      <td class="px-6 py-4 text-center text-sm font-medium" style="color: ${total >= 40 ? '#10B981' : total > 0 ? '#F59E0B' : '#6B7280'}">${hours[4]}h</td>
      <td class="px-6 py-4 text-center text-sm text-gray-600">${hours[5]}h</td>
      <td class="px-6 py-4 text-center text-sm text-gray-600">${hours[6]}h</td>
      <td class="px-6 py-4 text-center">${barsSvg}</td>
      <td class="px-6 py-4 text-right">
        <div class="text-sm font-bold text-gray-900">${total}h</div>
        <div class="text-xs text-gray-500">${total >= 40 ? '+' + (total - 40) + 'h' : total < 35 ? '-' + (35 - total) + 'h' : 'OK'}</div>
      </td>
      <td class="px-6 py-4 text-center">
        <span class="${status}">${statusText}</span>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// ============ STATS ============
function updateStats() {
  const weekStart = document.getElementById('weekStart').value;
  let totalAll = 0;
  let complete = 0;

  EMPLOYEES.forEach(emp => {
    if (!weekHours[emp]) return;
    const hours = weekHours[emp][weekStart] || [0, 0, 0, 0, 0, 0, 0];
    const total = hours.reduce((a, b) => a + b, 0);
    totalAll += total;
    if (total >= 40) complete++;
  });

  document.getElementById('totalHours').textContent = totalAll + 'h';
  document.getElementById('overtimeHours').textContent = Math.max(0, totalAll - 160) + 'h';
  document.getElementById('completeCount').textContent = complete + '/4';
}

// ============ MODALS ============
function openEditModal(employe, weekStart) {
  currentEditingEmploye = employe;
  document.getElementById('editModalTitle').textContent = `Éditer heures - ${escapeHtml(employe)}`;

  const hours = weekHours[employe][weekStart] || [0, 0, 0, 0, 0, 0, 0];
  const days = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi', 'Dimanche'];

  const container = document.getElementById('dayInputs');
  container.innerHTML = '';

  days.forEach((day, idx) => {
    const div = document.createElement('div');
    div.innerHTML = `
      <label class="block text-sm font-medium text-gray-700 mb-1">${day}</label>
      <input type="number" class="day-input w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary" value="${hours[idx]}" step="0.5" min="0" max="24" data-day="${idx}" />
    `;
    container.appendChild(div);
  });

  document.getElementById('editModal').classList.remove('hidden');
}

function closeEditModal() {
  document.getElementById('editModal').classList.add('hidden');
  currentEditingEmploye = null;
}

// ============ FORM HANDLING ============
function handleSaveHours(e) {
  e.preventDefault();

  const weekStart = document.getElementById('weekStart').value;
  const hours = Array.from(document.querySelectorAll('.day-input')).map(input =>
    parseFloat(input.value) || 0
  );

  if (!weekHours[currentEditingEmploye]) {
    weekHours[currentEditingEmploye] = {};
  }

  weekHours[currentEditingEmploye][weekStart] = hours;
  saveData();
  renderTable();
  updateStats();
  showToast('Heures enregistrées avec succès', 'success');
  closeEditModal();
}

function markWeekComplete() {
  const weekStart = document.getElementById('weekStart').value;
  EMPLOYEES.forEach(emp => {
    if (!weekHours[emp]) weekHours[emp] = {};
    if (!weekHours[emp][weekStart]) {
      weekHours[emp][weekStart] = [8, 8, 8, 8, 8, 0, 0];
    }
  });
  saveData();
  renderTable();
  updateStats();
  showToast('Semaine validée', 'success');
}

function exportWeekData() {
  const weekStart = document.getElementById('weekStart').value;
  let csv = 'Employé,Lun,Mar,Mer,Jeu,Ven,Sam,Dim,Total\n';

  EMPLOYEES.forEach(emp => {
    const hours = weekHours[emp]?.[weekStart] || [0, 0, 0, 0, 0, 0, 0];
    const total = hours.reduce((a, b) => a + b, 0);
    csv += `${emp},${hours.join(',')},${total}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `heures_${weekStart}.csv`;
  a.click();
  showToast('Données exportées', 'success');
}

function printWeek() {
  window.print();
}

// ============ INITIALIZATION ============
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initData);
} else {
  initData();
}
</script>
</body>
</html>
