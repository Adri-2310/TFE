<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logs d'Audit — SocialFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   { DEFAULT: '#0F7BA7', light: '#1A9FD4', dark: '#0A5A7A' },
            secondary: { DEFAULT: '#10B981', light: '#34D399', dark: '#059669' },
            accent:    { DEFAULT: '#F97316' },
            danger:    { DEFAULT: '#EF4444' },
            warning:   { DEFAULT: '#F59E0B' },
            sidebar:   { DEFAULT: '#0F172A' },
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-in-out',
            'slide-up': 'slideUp 0.3s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          }
        }
      }
    }
  </script>
  <style>
    .modal-backdrop { animation: fadeIn 0.3s ease-in-out; }
    .modal-content { animation: slideUp 0.3s ease-out; }
    .toast { animation: slideUp 0.3s ease-out, fadeOut 0.3s ease-out 2.7s forwards; }
    @keyframes fadeOut { 100% { opacity: 0; transform: translateY(-10px); } }
    .badge-create { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800; }
    .badge-update { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800; }
    .badge-delete { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800; }
    .badge-login { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800; }
    .badge-export { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800; }
    .badge-error { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800; }
    .btn-primary { @apply bg-primary text-white px-4 py-2.5 rounded-lg text-sm font-medium hover:bg-primary-dark transition-colors; }
    .btn-secondary { @apply bg-gray-200 text-gray-900 px-4 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-300 transition-colors; }
    .action-icon { @apply w-5 h-5; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<main class="ml-64 min-h-screen flex flex-col">
  <!-- Header -->
  <div class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="px-8 py-6">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Logs d'audit</h1>
          <p class="text-gray-500 text-sm mt-1">Historique de toutes les actions système</p>
        </div>
        <div class="flex gap-2">
          <button onclick="exportToJSON()" class="btn-secondary">↓ JSON</button>
          <button onclick="exportToCSV()" class="btn-secondary">↓ CSV</button>
          <button onclick="clearFilters()" class="btn-primary">Réinitialiser</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="p-8 flex-1">
    <!-- Filters & Search -->
    <div class="mb-6 space-y-4">
      <div class="flex flex-col sm:flex-row gap-4">
        <input
          type="text"
          id="searchInput"
          placeholder="Rechercher (utilisateur, ressource, IP...)..."
          class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
        />
        <input
          type="date"
          id="dateFilter"
          class="px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
        />
      </div>

      <div class="flex flex-col sm:flex-row gap-4">
        <select id="actionFilter" class="px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
          <option value="">Tous les types d'actions</option>
          <option value="CREATE">Création</option>
          <option value="UPDATE">Modification</option>
          <option value="DELETE">Suppression</option>
          <option value="LOGIN">Connexion</option>
          <option value="EXPORT">Export</option>
          <option value="ERROR">Erreur</option>
        </select>

        <select id="resourceFilter" class="px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
          <option value="">Tous les types de ressources</option>
          <option value="User">Utilisateurs</option>
          <option value="Secretariat">Secrétariats</option>
          <option value="API Key">Clés API</option>
          <option value="Config">Configuration</option>
          <option value="System">Système</option>
        </select>

        <select id="statusFilter" class="px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
          <option value="">Tous les statuts</option>
          <option value="success">Succès</option>
          <option value="error">Erreur</option>
          <option value="warning">Avertissement</option>
        </select>
      </div>
    </div>

    <!-- Summary Stats -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 uppercase font-semibold">Total des logs</p>
        <p class="text-2xl font-bold text-gray-900 mt-1" id="totalLogs">0</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 uppercase font-semibold">Aujourd'hui</p>
        <p class="text-2xl font-bold text-gray-900 mt-1" id="todayLogs">0</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 uppercase font-semibold">Erreurs</p>
        <p class="text-2xl font-bold text-danger mt-1" id="errorLogs">0</p>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <p class="text-xs text-gray-500 uppercase font-semibold">Avertissements</p>
        <p class="text-2xl font-bold text-warning mt-1" id="warningLogs">0</p>
      </div>
    </div>

    <!-- Logs Table -->
    <div class="bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase cursor-pointer hover:bg-gray-100" onclick="sortTable('timestamp')">
                Date & Heure
              </th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase">Utilisateur</th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase">Action</th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase">Ressource</th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase">Statut</th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase">IP</th>
              <th class="px-6 py-3 text-center text-xs font-semibold text-gray-600 uppercase">Action</th>
            </tr>
          </thead>
          <tbody id="logsTableBody" class="divide-y divide-gray-200">
            <!-- Dynamically populated -->
          </tbody>
        </table>
      </div>
      <div class="px-6 py-4 border-t border-gray-200 text-sm text-gray-600 bg-gray-50">
        <span id="recordCount">Affichage 0 logs</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 py-6 px-8 text-center text-gray-500 text-sm">
    <p>&copy; 2026 SocialFlow SPRL. Tous droits réservés.</p>
  </footer>
</main>

<!-- DETAILS MODAL -->
<div id="detailsModal" class="hidden fixed inset-0 bg-black/50 modal-backdrop z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl modal-content max-w-2xl w-full max-h-[90vh] overflow-y-auto">
    <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
      <h2 class="text-xl font-bold text-gray-900">Détails du log</h2>
      <button onclick="closeDetailsModal()" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">&times;</button>
    </div>

    <div id="detailsContent" class="p-6 space-y-4">
      <!-- Dynamically populated -->
    </div>

    <div class="sticky bottom-0 bg-gray-50 border-t border-gray-200 px-6 py-4">
      <button onclick="closeDetailsModal()" class="btn-secondary w-full">Fermer</button>
    </div>
  </div>
</div>

<!-- TOAST NOTIFICATIONS -->
<div id="toastContainer" class="fixed bottom-6 right-6 z-50 space-y-2"></div>

<script src="./includes.js"></script>
<script>
// ============ STATE MANAGEMENT ============
let logs = [];
let sortBy = 'timestamp';
let sortOrder = 'desc';

// ============ INITIALIZATION ============
function initData() {
  const saved = localStorage.getItem('auditLogs');
  if (saved) {
    logs = JSON.parse(saved);
  } else {
    logs = [
      { id: 1, timestamp: '2026-06-25 15:45', user: 'Marie Aubry', action: 'UPDATE', resource: 'User', resourceId: 'user_123', description: 'Modification du profil utilisateur', details: { field: 'role', oldValue: 'Utilisateur', newValue: 'Manager' }, status: 'success', ip: '192.168.1.101', userAgent: 'Chrome 91.0 / Windows 11' },
      { id: 2, timestamp: '2026-06-25 15:32', user: 'Thomas Laurent', action: 'LOGIN', resource: 'System', resourceId: '', description: 'Connexion utilisateur', details: { method: 'email', location: 'Bruxelles, BE' }, status: 'success', ip: '203.45.67.89', userAgent: 'Safari 14.1 / macOS' },
      { id: 3, timestamp: '2026-06-25 14:58', user: 'Admin SocialFlow', action: 'DELETE', resource: 'API Key', resourceId: 'key_456', description: 'Révocation de clé API', details: { keyName: 'Legacy Key - Paie Plus', reason: 'Sécurité' }, status: 'success', ip: '192.168.1.50', userAgent: 'Chrome 91.0 / Ubuntu' },
      { id: 4, timestamp: '2026-06-25 14:15', user: 'System', action: 'ERROR', resource: 'API', resourceId: '', description: 'Erreur de quota dépassé', details: { endpoint: '/api/v1/users', statusCode: 429 }, status: 'error', ip: '10.0.0.1', userAgent: 'API Client' },
      { id: 5, timestamp: '2026-06-25 13:42', user: 'Céline Bonnet', action: 'CREATE', resource: 'Secretariat', resourceId: 'sec_789', description: 'Création de nouveau secrétariat', details: { name: 'New Secretariat LLC', plan: 'Pro' }, status: 'success', ip: '192.168.1.102', userAgent: 'Firefox 89.0 / Linux' },
      { id: 6, timestamp: '2026-06-25 13:15', user: 'Thomas Laurent', action: 'EXPORT', resource: 'User', resourceId: '', description: 'Export de liste des utilisateurs', details: { format: 'CSV', count: 254 }, status: 'success', ip: '203.45.67.89', userAgent: 'Chrome 91.0 / macOS' },
      { id: 7, timestamp: '2026-06-25 12:30', user: 'Sophie Noel', action: 'UPDATE', resource: 'Config', resourceId: 'config_001', description: 'Modification de configuration système', details: { setting: 'max_users', oldValue: '1000', newValue: '2000' }, status: 'warning', ip: '192.168.1.103', userAgent: 'Chrome 91.0 / Windows 10' },
      { id: 8, timestamp: '2026-06-25 11:45', user: 'System', action: 'ERROR', resource: 'Database', resourceId: '', description: 'Erreur de connexion à la base de données', details: { error: 'Connection timeout', retry: 3 }, status: 'error', ip: '10.0.0.5', userAgent: 'System' },
      { id: 9, timestamp: '2026-06-25 10:20', user: 'Jean Dupont', action: 'LOGIN', resource: 'System', resourceId: '', description: 'Tentative de connexion échouée', details: { method: 'email', reason: 'Mot de passe incorrect' }, status: 'error', ip: '185.220.101.45', userAgent: 'Chrome 90.0 / Windows 11' },
      { id: 10, timestamp: '2026-06-25 09:30', user: 'Marie Aubry', action: 'DELETE', resource: 'User', resourceId: 'user_999', description: 'Suppression de compte utilisateur', details: { userName: 'Ancien Utilisateur', reason: 'Inactif depuis 6 mois' }, status: 'success', ip: '192.168.1.101', userAgent: 'Chrome 91.0 / Windows 11' },
      { id: 11, timestamp: '2026-06-24 18:15', user: 'Admin SocialFlow', action: 'UPDATE', resource: 'System', resourceId: '', description: 'Mise à jour du système', details: { version: '2.4.0', duration: '5 minutes' }, status: 'success', ip: '192.168.1.50', userAgent: 'System' },
      { id: 12, timestamp: '2026-06-24 15:45', user: 'Céline Bonnet', action: 'CREATE', resource: 'API Key', resourceId: 'key_new_123', description: 'Génération de nouvelle clé API', details: { environment: 'Production', quota: '100000' }, status: 'success', ip: '192.168.1.102', userAgent: 'Chrome 91.0 / Windows 11' },
    ];
    saveData();
  }
  renderLogsTable();
  setupEventListeners();
  updateStats();
}

function saveData() {
  localStorage.setItem('auditLogs', JSON.stringify(logs));
}

function updateStats() {
  const today = new Date().toLocaleDateString('fr-FR');
  const todayCount = logs.filter(l => l.timestamp.split(' ')[0].split('/').reverse().join('-') === today).length;
  const errorCount = logs.filter(l => l.status === 'error').length;
  const warningCount = logs.filter(l => l.status === 'warning').length;

  document.getElementById('totalLogs').textContent = logs.length;
  document.getElementById('todayLogs').textContent = todayCount;
  document.getElementById('errorLogs').textContent = errorCount;
  document.getElementById('warningLogs').textContent = warningCount;
}

// ============ EVENTS ============
function setupEventListeners() {
  document.getElementById('searchInput').addEventListener('input', renderLogsTable);
  document.getElementById('dateFilter').addEventListener('change', renderLogsTable);
  document.getElementById('actionFilter').addEventListener('change', renderLogsTable);
  document.getElementById('resourceFilter').addEventListener('change', renderLogsTable);
  document.getElementById('statusFilter').addEventListener('change', renderLogsTable);
}

// ============ TABLE RENDERING ============
function getFilteredLogs() {
  let data = [...logs];

  const search = document.getElementById('searchInput').value.toLowerCase();
  if (search) {
    data = data.filter(l =>
      l.user.toLowerCase().includes(search) ||
      l.resource.toLowerCase().includes(search) ||
      l.ip.includes(search) ||
      l.description.toLowerCase().includes(search)
    );
  }

  const date = document.getElementById('dateFilter').value;
  if (date) {
    const selectedDate = new Date(date).toLocaleDateString('fr-FR');
    data = data.filter(l => l.timestamp.split(' ')[0] === selectedDate);
  }

  const action = document.getElementById('actionFilter').value;
  if (action) {
    data = data.filter(l => l.action === action);
  }

  const resource = document.getElementById('resourceFilter').value;
  if (resource) {
    data = data.filter(l => l.resource === resource);
  }

  const status = document.getElementById('statusFilter').value;
  if (status) {
    data = data.filter(l => l.status === status);
  }

  // Sort
  data.sort((a, b) => {
    let aVal = a[sortBy];
    let bVal = b[sortBy];

    if (sortBy === 'timestamp') {
      aVal = new Date(aVal);
      bVal = new Date(bVal);
    }

    if (sortOrder === 'asc') {
      return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
    } else {
      return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
    }
  });

  return data;
}

function renderLogsTable() {
  const data = getFilteredLogs();
  const tbody = document.getElementById('logsTableBody');
  tbody.innerHTML = '';

  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500">Aucun log trouvé</td></tr>';
    document.getElementById('recordCount').textContent = 'Affichage 0 logs';
    return;
  }

  data.forEach(log => {
    const actionBadgeClass = {
      'CREATE': 'badge-create',
      'UPDATE': 'badge-update',
      'DELETE': 'badge-delete',
      'LOGIN': 'badge-login',
      'EXPORT': 'badge-export',
      'ERROR': 'badge-error'
    }[log.action] || 'badge-create';

    const actionLabel = {
      'CREATE': 'Création',
      'UPDATE': 'Modification',
      'DELETE': 'Suppression',
      'LOGIN': 'Connexion',
      'EXPORT': 'Export',
      'ERROR': 'Erreur'
    }[log.action] || log.action;

    const tr = document.createElement('tr');
    tr.className = 'hover:bg-gray-50 transition-colors';
    tr.innerHTML = `
      <td class="px-6 py-4 text-sm text-gray-900 font-medium">${log.timestamp}</td>
      <td class="px-6 py-4 text-sm text-gray-600">${escapeHtml(log.user)}</td>
      <td class="px-6 py-4">
        <span class="${actionBadgeClass}">
          ${actionLabel}
        </span>
      </td>
      <td class="px-6 py-4 text-sm text-gray-600">${log.resource}</td>
      <td class="px-6 py-4">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${
          log.status === 'success' ? 'bg-green-100 text-green-800' :
          log.status === 'error' ? 'bg-red-100 text-red-800' :
          'bg-yellow-100 text-yellow-800'
        }">
          ${log.status === 'success' ? '✓ Succès' : log.status === 'error' ? '✗ Erreur' : '⚠ Avertissement'}
        </span>
      </td>
      <td class="px-6 py-4 text-sm text-gray-600 font-mono">${log.ip}</td>
      <td class="px-6 py-4 text-center">
        <button onclick="openDetailsModal(${log.id})" class="text-primary hover:underline text-sm font-medium">Détails</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('recordCount').textContent = `Affichage ${data.length} log${data.length > 1 ? 's' : ''}`;
}

function sortTable(field) {
  if (sortBy === field) {
    sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
  } else {
    sortBy = field;
    sortOrder = 'desc';
  }
  renderLogsTable();
}

// ============ MODALS ============
function openDetailsModal(id) {
  const log = logs.find(l => l.id === id);
  if (!log) return;

  const content = document.getElementById('detailsContent');

  let detailsHtml = '<div class="space-y-4">';

  detailsHtml += `
    <div class="grid grid-cols-2 gap-4">
      <div>
        <p class="text-xs text-gray-500 uppercase font-semibold">Date & Heure</p>
        <p class="text-gray-900 font-medium">${log.timestamp}</p>
      </div>
      <div>
        <p class="text-xs text-gray-500 uppercase font-semibold">Utilisateur</p>
        <p class="text-gray-900 font-medium">${escapeHtml(log.user)}</p>
      </div>
      <div>
        <p class="text-xs text-gray-500 uppercase font-semibold">Action</p>
        <p class="text-gray-900">${log.action}</p>
      </div>
      <div>
        <p class="text-xs text-gray-500 uppercase font-semibold">Ressource</p>
        <p class="text-gray-900">${log.resource}</p>
      </div>
    </div>

    <div class="pt-4 border-t border-gray-200">
      <p class="text-xs text-gray-500 uppercase font-semibold mb-2">Description</p>
      <p class="text-gray-900">${escapeHtml(log.description)}</p>
    </div>

    <div class="grid grid-cols-2 gap-4 pt-4 border-t border-gray-200">
      <div>
        <p class="text-xs text-gray-500 uppercase font-semibold">Adresse IP</p>
        <p class="text-gray-900 font-mono text-sm">${log.ip}</p>
      </div>
      <div>
        <p class="text-xs text-gray-500 uppercase font-semibold">Statut</p>
        <p class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${
          log.status === 'success' ? 'bg-green-100 text-green-800' :
          log.status === 'error' ? 'bg-red-100 text-red-800' :
          'bg-yellow-100 text-yellow-800'
        } mt-1">
          ${log.status === 'success' ? '✓ Succès' : log.status === 'error' ? '✗ Erreur' : '⚠ Avertissement'}
        </p>
      </div>
    </div>

    <div class="pt-4 border-t border-gray-200">
      <p class="text-xs text-gray-500 uppercase font-semibold mb-2">Agent utilisateur</p>
      <p class="text-gray-900 text-sm">${escapeHtml(log.userAgent)}</p>
    </div>
  `;

  if (Object.keys(log.details).length > 0) {
    detailsHtml += `
      <div class="pt-4 border-t border-gray-200">
        <p class="text-xs text-gray-500 uppercase font-semibold mb-2">Détails additionnels</p>
        <div class="bg-gray-50 rounded-lg p-4 space-y-2">
    `;

    for (const [key, value] of Object.entries(log.details)) {
      detailsHtml += `
        <div class="flex justify-between items-start">
          <span class="text-sm text-gray-600">${escapeHtml(key)}</span>
          <span class="text-sm font-medium text-gray-900">${typeof value === 'object' ? JSON.stringify(value) : escapeHtml(String(value))}</span>
        </div>
      `;
    }

    detailsHtml += '</div></div>';
  }

  detailsHtml += '</div>';

  content.innerHTML = detailsHtml;
  document.getElementById('detailsModal').classList.remove('hidden');
}

function closeDetailsModal() {
  document.getElementById('detailsModal').classList.add('hidden');
}

// ============ EXPORT FUNCTIONS ============
function exportToJSON() {
  const data = getFilteredLogs();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  downloadFile(blob, `socialflow-audit-logs-${Date.now()}.json`);
  showToast('Logs exportés en JSON', 'success');
}

function exportToCSV() {
  const data = getFilteredLogs();

  let csv = 'Date,Utilisateur,Action,Ressource,Statut,IP,Description\n';

  data.forEach(log => {
    const row = [
      `"${log.timestamp}"`,
      `"${log.user}"`,
      `"${log.action}"`,
      `"${log.resource}"`,
      `"${log.status}"`,
      `"${log.ip}"`,
      `"${log.description}"`
    ].join(',');
    csv += row + '\n';
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  downloadFile(blob, `socialflow-audit-logs-${Date.now()}.csv`);
  showToast('Logs exportés en CSV', 'success');
}

function downloadFile(blob, filename) {
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  window.URL.revokeObjectURL(url);
  document.body.removeChild(a);
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('dateFilter').value = '';
  document.getElementById('actionFilter').value = '';
  document.getElementById('resourceFilter').value = '';
  document.getElementById('statusFilter').value = '';
  renderLogsTable();
  showToast('Filtres réinitialisés', 'success');
}

// ============ UTILITIES ============
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast px-4 py-3 rounded-lg text-sm font-medium text-white ${type === 'success' ? 'bg-secondary' : 'bg-danger'}`;
  toast.textContent = message;
  container.appendChild(toast);

  setTimeout(() => toast.remove(), 3000);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
